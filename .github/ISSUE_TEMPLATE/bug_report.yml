name: 🐛 Basic Issue
description: Report a bug or issue with the project
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please search existing issues before creating a new one to avoid duplicates.

  - type: input
    id: subtitle
    attributes:
      label: Issue Subtitle
      description: Provide another hook into the issue context despite its title
      placeholder: A brief description of what's not working
    validations:
      required: false

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Specify the file names and line ranges where the issue occurs
      placeholder: |
        - `main.rs`:13-77
        - `lib.rs`:13-77
        - `shared/util.rs`:13-77
    validations:
      required: true

  - type: textarea
    id: code-snippet
    attributes:
      label: Code Snippet
      description: Provide a quick snippet of the main location pointed as the issue
      placeholder: Paste the relevant code here
      render: rust
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: e.g., Ubuntu 22.04, Windows 11, macOS 14
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: Architecture
      description: What system architecture are you running?
      placeholder: e.g., x64, x86, ARM64
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: What version of the package are you using?
      placeholder: e.g., 0.2.1
    validations:
      required: true

  - type: textarea
    id: additional-meta
    attributes:
      label: Additional Metadata
      description: Any other relevant version information or dependencies
      placeholder: |
        - Rust version: 1.75.0
        - Cargo version: 1.75.0
    validations:
      required: false

  - type: textarea
    id: issue-description
    attributes:
      label: Issue Description
      description: Provide a detailed description of the issue
      placeholder: Describe what's happening and what you expected to happen
    validations:
      required: true

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested Fix
      description: If you have an idea on how to fix this issue, please share it
      placeholder: Describe your suggested approach to fixing this issue
    validations:
      required: false

  - type: textarea
    id: fix-snippet
    attributes:
      label: Fix Implementation
      description: If you've analyzed the source code and have a concrete fix, provide the code snippet
      placeholder: Paste your suggested code fix here
      render: rust
    validations:
      required: false
