name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format (must be exact vX.X.X)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match release format vX.X.X"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "✓ Valid release tag: $TAG"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Rust crate
        run: cargo package -p runpy

      - name: Build Python package
        working-directory: ./worker
        run: uv build

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp ./target/package/runpy-*.crate release-artifacts/
          cp ./worker/dist/*.tar.gz release-artifacts/
          cp ./worker/dist/*.whl release-artifacts/
          echo "📦 Release artifacts:"
          ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.TAG }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
